pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = 'expo-circular-reveal'

// Include expo-modules-core from node_modules for standalone CI builds
def expoModulesCore = file('../node_modules/expo-modules-core/android')
if (expoModulesCore.exists()) {
    include ':expo-modules-core'
    project(':expo-modules-core').projectDir = expoModulesCore
}
