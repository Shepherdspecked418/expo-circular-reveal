name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
      - run: biome ci src/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --no-save expo-modules-core expo react react-native typescript expo-module-scripts
      - run: npx tsc --noEmit

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=0.57.0
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux.zip" -o swiftlint.zip
          unzip -q swiftlint.zip swiftlint
          chmod +x swiftlint
          sudo mv swiftlint /usr/local/bin/
      - run: swiftlint lint --strict ios/

  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ktlint
        run: |
          KTLINT_VERSION=1.5.0
          curl -sL "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint" -o ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/
      - run: ktlint "android/**/*.kt"

  android-build:
    name: Android build (example app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: example
        run: npm install
      - name: Prebuild Android
        working-directory: example
        run: npx expo prebuild --platform android
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.7'
      - name: Build
        working-directory: example/android
        run: ./gradlew assembleDebug
